name: Build flux-gl for Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v5
        with:
          name: flux
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build flux-gl for Windows
        run: nix build .#flux-gl-windows --print-build-logs
      
      - name: Show build output
        run: ls -R result
      
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: flux-gl-windows
          path: result/**
